<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Presente</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin:0;
padding-top:100px;
}

button{
padding:12px 25px;
font-size:18px;
background:#ff4d6d;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

input{
padding:10px;
font-size:16px;
}

.tela{
display:none;
}

.caixa{
width:150px;
height:150px;
margin:auto;
cursor:pointer;
position:relative;
}

.tampa{
width:150px;
height:40px;
background:red;
position:absolute;
top:0;
transition:1s;
}

.base{
width:150px;
height:110px;
background:#ff8080;
position:absolute;
bottom:0;
}

.aberta .tampa{
transform:rotate(-40deg) translateY(-60px);
}

</style>

</head>

<body>

<div id="inicio">

<h1>🎁 Existe um presente para você</h1>

<button onclick="comecar()">Começar</button>

</div>

<div id="quiz" class="tela">

<h2>Há quantos dias estamos juntos?</h2>

<input id="resposta">

<br><br>

<button onclick="verificar()">Responder</button>

</div>

<div id="presente" class="tela">

<h2>🎉 Você acertou</h2>

<p>Clique no presente</p>

<div class="caixa" id="caixa" onclick="abrir()">

<div class="tampa"></div>
<div class="base"></div>

</div>

<div id="conteudo" style="display:none">

<h1>❤️ Vale 1000 em roupas ❤️</h1>

<p>Esse é seu presente</p>

</div>

</div>

<script>

function comecar(){

document.getElementById("inicio").style.display="none"
document.getElementById("quiz").style.display="block"

}

function verificar(){

let r=document.getElementById("resposta").value

if(r=="313"){

document.getElementById("quiz").style.display="none"
document.getElementById("presente").style.display="block"

}else{

alert("Resposta errada")

}

}

function abrir(){

document.getElementById("caixa").classList.add("aberta")

setTimeout(()=>{

document.getElementById("conteudo").style.display="block"

},1000)

}

</script>

</body>
</html>
