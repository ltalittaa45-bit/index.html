<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Quiz Especial</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#ffe6f0;
padding:40px;
}

.quiz{
background:white;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
}

button{
padding:10px 20px;
margin-top:10px;
cursor:pointer;
}

#presente{
display:none;
margin-top:40px;
font-size:60px;
cursor:pointer;
}

#premio{
display:none;
margin-top:20px;
font-size:24px;
color:#e60073;
font-weight:bold;
}
</style>
</head>

<body>

<div class="quiz">

<h2>Responda para abrir o presente 🎁</h2>

<p>Qual é a cor do amor?</p>

<button onclick="acertou()">Vermelho</button>
<button onclick="errou()">Azul</button>
<button onclick="errou()">Verde</button>

</div>

<div id="presente" onclick="abrirPresente()">
🎁
</div>

<div id="premio">
🎉 PARABÉNS! 🎉<br><br>
Você ganhou um<br>
💳 VALE DE R$1000 EM ROUPAS 💳
</div>

<script>

function acertou(){
alert("Resposta correta! Agora abra seu presente 🎁");
document.getElementById("presente").style.display="block";
}

function errou(){
alert("Resposta errada! Tente novamente.");
}

function abrirPresente(){
document.getElementById("premio").style.display="block";
}

</script>

</body>
</html>
